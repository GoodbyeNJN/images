name: Caddy

on:
  workflow_dispatch:
  # schedule:
  #   - cron: 0 * * * *

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      VERSION: "2.11.2"

    steps:
      - name: Get latest Caddy version
        run: |
          latest_tag=$(curl -s https://api.github.com/repos/caddyserver/caddy/releases/latest | jq -r '.tag_name')
          echo "VERSION=${latest_tag#v}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.caddy
          push: true
          provenance: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/caddy-proxy:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/caddy-proxy:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CADDY_VERSION=${{ env.VERSION }}
