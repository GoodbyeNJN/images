name: Caddy

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: write
  packages: write

env:
  PROJECT_NAME: caddy-proxy
  VERSION: "2.11.2"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Latest Caddy Version
        id: fetch_version
        run: |
          latest_tag=$(curl -s -f https://api.github.com/repos/caddyserver/caddy/releases/latest | jq -r '.tag_name')
          version=${latest_tag#v}
          echo "VERSION=$version" >> $GITHUB_ENV
          echo "Debug: Fetched version from upstream: $version"

      - name: Check Registry for Existing Image
        id: check_registry
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/${{ env.PROJECT_NAME }}"
          TAG="${{ env.VERSION }}"
          FULL_IMAGE="$IMAGE_NAME:$TAG"

          echo "Debug: Target image is $FULL_IMAGE"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Status: Manual trigger detected. Forcing build and push."
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif docker manifest inspect "$FULL_IMAGE" > /dev/null 2>&1; then
            echo "Status: Image $FULL_IMAGE already exists. Skipping build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "Status: Image $FULL_IMAGE not found. Proceeding with build."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Repository
        if: steps.check_registry.outputs.should_build == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Docker Buildx
        if: steps.check_registry.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: steps.check_registry.outputs.should_build == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker Metadata
        if: steps.check_registry.outputs.should_build == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.PROJECT_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.VERSION }}

      - name: Build and Push Image
        if: steps.check_registry.outputs.should_build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./
          file: ./Dockerfile.caddy
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CADDY_VERSION=${{ env.VERSION }}
